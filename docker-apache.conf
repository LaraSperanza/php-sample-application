<VirtualHost *:80>
    ServerName example-app.com
    DocumentRoot /var/www/html/web

    # Enviamos los logs a la salida estándar
    ErrorLog /dev/stderr
    CustomLog /dev/stdout combined

    <Directory /var/www/html>
        Require all granted
        AllowOverride all
    </Directory>

    php_admin_value include_path "/var/www/html/"

    Include /var/www/html/config-aws/vhost.conf
</VirtualHost>